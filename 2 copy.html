<script>
    //entrada
    let n1 = parseInt(prompt("Digite o valor do 1ª numero"));

    let n2 = parseInt(prompt("Digite o valor 2º numero"));

    //processamento 
   let soma  = n1 + n2 ;
   let sub = n1 - n2;
   let mult = n1* n2;
   let potencia = n1 ** n2 ;
   
   // saida
   document.write("A soma foi:" + soma+"<br/>");

   document.write("A subtracao foi:" + sub+"<br/>");

   document.write("A multiplicacao foi: "+ mult+"<br/>");

   document.write("A potencia de "+ n1 +"elevado a :"+ n2 +" = " + potencia+"<br/>");




</script>
